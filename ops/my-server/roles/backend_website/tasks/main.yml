---
- name: Add HTTPS site configuration
  ansible.builtin.template:
    src: https.conf.j2
    dest: "/etc/nginx/sites-enabled/{{ backend_website_config.server_name }}.https.conf"
    mode: "0644"

- name: Reload nginx
  tags: [deploy]
  ansible.builtin.service:
    name: nginx
    state: reloaded
