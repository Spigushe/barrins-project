---
- name: Ensure app root folder is present
  file:
    state: directory
    path: "{{ r.app_root }}"
    owner: "{{ username }}"
    mode: 0755

- name: Resolve the latest release tag
  when: r.use_release_tag and r.release_tag | length == 0
  delegate_to: localhost
  become: "no"
  no_log: true
  uri:
    url: "https://api.github.com/repos/{{ r.repo }}/releases/latest"
    headers:
      Authorization: "token {{ r.github_token }}"
      Accept: "application/vnd.github+json"
    status_code: [200, 404]
  register: fb_latest_release

- name: Fail if a release-tag deploy was requested but no release exists yet
  fail:
    msg: >-
      {{ r.repo }} has no GitHub release yet, but this deploy requires one
      (fb_use_release_tag=true — see the Constitution's release policy).
      Cut a release on GitHub first, or pin one explicitly with
      fb_release_tag=<tag>.
  when: >-
    r.use_release_tag and r.release_tag | length == 0 and
    fb_latest_release.status == 404

- name: Compute the ref to deploy — pinned/latest release tag
  set_fact:
    fb_deploy_ref: "{{ r.release_tag if r.release_tag | length > 0 else fb_latest_release.json.tag_name }}"
  when: r.use_release_tag

- name: Compute the ref to deploy — branch
  set_fact:
    fb_deploy_ref: "{{ r.git_branch }}"
  when: not r.use_release_tag

- name: Clone/update application repository
  become: "no"
  no_log: true
  tags:
    - deploy
  git:
    repo: "https://{{ r.github_token }}@github.com/{{ r.repo }}.git"
    dest: "{{ r.app_root }}"
    version: "{{ fb_deploy_ref }}"
    update: "yes"

- name: Ensure uv is installed
  become: "no"
  shell: |
    set -o pipefail
    curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    executable: /bin/bash
    creates: "/home/{{ username }}/.local/bin/uv"

- name: Check for a uv/pyproject project
  stat:
    path: "{{ r.app_root }}/pyproject.toml"
  register: fb_pyproject

- name: Install dependencies with uv
  become: "no"
  tags:
    - deploy
  command: "/home/{{ username }}/.local/bin/uv sync"
  args:
    chdir: "{{ r.app_root }}"
  when: fb_pyproject.stat.exists

- name: Install dependencies with pip
  become: "no"
  tags:
    - deploy
  pip:
    chdir: "{{ r.app_root }}"
    requirements: "{{ r.app_root }}/requirements.txt"
    state: latest
    virtualenv: "{{ r.app_root }}/.venv"
    virtualenv_command: /usr/bin/python3 -m venv
  when: not fb_pyproject.stat.exists

- name: Check whether a local .env file is available for this deploy
  when: r.env_file | length > 0
  delegate_to: localhost
  become: "no"
  stat:
    path: "{{ r.env_file }}"
  register: fb_env_file_stat

- name: Deploy the local .env file, if available
  tags:
    - deploy
  copy:
    src: "{{ r.env_file }}"
    dest: "{{ r.app_root }}/.env"
    owner: "{{ username }}"
    mode: 0600
  when: r.env_file | length > 0 and fb_env_file_stat.stat.exists

- name: Note — no local .env found, server's existing one (if any) left untouched
  tags:
    - deploy
  debug:
    msg: >-
      {{ r.env_file }} not found locally, skipping — this file is
      git-ignored on purpose (see secrets/README.md) and only ever lives on
      operators' machines. {{ r.app_root }}/.env on the server is left
      as-is.
  when: r.env_file | length > 0 and not fb_env_file_stat.stat.exists

- name: Add service
  template:
    src: service.j2
    dest: "/etc/systemd/system/{{ r.app_name }}.service"

- name: Restart the service
  tags:
    - deploy
  systemd:
    name: "{{ r.app_name }}"
    daemon_reload: "yes"
    enabled: "yes"
    state: restarted
