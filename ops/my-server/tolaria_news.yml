---
# Frontend-only playbook for Tolaria News. It points VITE_API_BASE_URL at
# the shared barrins_api backend but never deploys/restarts it — that's
# barrins_api.yml's job exclusively (run it at least once, and again
# whenever barrins_api itself changes; see the root README's "Multiple
# frontends sharing one backend" section and docs/content/ops/deployment/frontend.md).
# One playbook per application (Constitution ss26.1) — this used to also
# embed its own copy of the fastapi_backend/backend_website roles; that
# duplicate has been removed, the same way tamiyo_scroll.yml already
# dropped it.
- name: Deploy the Tolaria News frontend
  hosts: spigushe
  become: true
  gather_facts: false
  vars:
    username: spigushe
    # Generated on GitHub (Settings > Developer settings > Personal access
    # tokens), scope: repo (read-only is enough). It must be renewed every
    # 30 days: run
    #   ansible-vault encrypt_string '<new_token>' --name 'github_token'
    # and replace the block below with the new output.
    github_token: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          37623761306536663933323932623931646336376638306462643435333637386438326131626566
          6666396635383530383562616438376235393833656639610a386265306461393736613838653738
          30306531643461636665633035373336396266656561643731306232373835646266613862363237
          6462663966353030320a666131643836623038343735623436626237623539383838336130303635
          31633837363832376538306538366339623363376664336237333139343739306539656630363233
          36656430616333633463393863323664653431666137613132353064626338336537336531663564
          31653165303037393062663634366437643032633962373232653739663839326433353439353933
          63366465363334643539656365646634343831633235306138623061343135383961343263663533
          6661

    # Defaults to a full production deploy — the latest GitHub release tag
    # of tolaria_news (Constitution ss25/ss27: production only ever
    # deploys released versions). Pass -e deploy_env=staging to deploy a
    # side-by-side staging frontend instead, from the staging branch by
    # default — still pointed at barrins_api's own staging instance, run
    # barrins_api.yml -e deploy_env=staging separately to have one).
    #   ansible-playbook tolaria_news.yml -e deploy_env=staging \
    #     -e react_frontend_git_branch=my-feature
    # Roll production back to an older release:
    #   ansible-playbook tolaria_news.yml -e react_frontend_release_tag=v1.2.3
    deploy_env: production
    env_suffix: "{{ '-staging' if deploy_env == 'staging' else '' }}"
    env_branch: "{{ 'staging' if deploy_env == 'staging' else 'main' }}"
    backend_domain: "api{{ env_suffix }}.barrins-codex.org"
    frontend_domain: "tolaria{{ env_suffix }}.barrins-codex.org"

  roles:
    - role: register_ssl
      tags: [frontend, certs]
      register_ssl_server_name: "{{ frontend_domain }}"

    - role: react_frontend
      tags: [frontend]
      # This monorepo (Spigushe/barrins-project), not a dedicated tolaria_news
      # repo — Tolaria News lives at apps/tolaria_news within it. NOTE:
      # apps/tolaria_news currently has no application code (README.md only)
      # — this role invocation isn't runnable yet, only wired for when it does.
      react_frontend_repo: Spigushe/barrins-project
      react_frontend_repo_subdir: apps/tolaria_news
      react_frontend_server_name: "{{ frontend_domain }}"
      react_frontend_app_name: "tolaria{{ env_suffix }}"
      react_frontend_use_release_tag: "{{ deploy_env == 'production' }}"
      react_frontend_git_branch: "{{ env_branch }}"
      # Assumed Vite build output. Update to "build" if this ends up being
      # a Create React App project.
      react_frontend_build_dir: dist
      react_frontend_build_env:
        VITE_API_BASE_URL: "https://{{ backend_domain }}"

  post_tasks:
    - name: Reminder — this playbook does not deploy barrins_api
      ansible.builtin.debug:
        msg:
          - "This playbook only deploys the Tolaria News frontend. Run"
          - "'ansible-playbook barrins_api.yml{{ ' -e deploy_env=staging' if deploy_env == 'staging' else '' }}'"
          - "separately (at least once, and again whenever barrins_api"
          - "itself changes) to have a backend at {{ backend_domain }} for"
          - "this frontend to call."
          - "barrins_api's ALLOWED_ORIGINS (in"
          - "secrets/barrins_api/{{ deploy_env }}.env, see"
          - "secrets/README.md) must include https://{{ frontend_domain }}."
      tags: [frontend, deploy]
