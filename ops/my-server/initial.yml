---
- name: Bootstrap a fresh host — base user, SSH hardening
  hosts: all
  become: true
  # become_method: su
  gather_facts: false

  vars:
    username: spigushe

  pre_tasks:
    - name: Install base packages
      raw: apt-get -y install python sudo
      tags:
        - skip_ansible_lint

  roles:
    - role: setup_base_user

  post_tasks:
    - name: Remove SSH access for root user
      ansible.builtin.lineinfile:
        dest: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin"
        line: "PermitRootLogin no"
    - name: Restart SSH
      ansible.builtin.service:
        name: ssh
        state: restarted
