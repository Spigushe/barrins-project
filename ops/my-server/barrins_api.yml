---
# Dedicated playbook for the barrins_api backend — the single place that
# deploys/restarts it. Frontend playbooks (tolaria.yml, tamiyo_scroll.yml)
# only point their VITE_API_BASE_URL at whatever this playbook already has
# running; they must never redeploy the backend themselves (see the root
# README's "Multiple frontends sharing one backend" section).
- name: Deploy/restart the shared barrins_api backend
  hosts: spigushe
  become: true
  gather_facts: false
  vars:
    username: spigushe
    # Generated on GitHub (Settings > Developer settings > Personal access
    # tokens), scope: repo (read-only is enough). It must be renewed every
    # 30 days: run
    #   ansible-vault encrypt_string '<new_token>' --name 'github_token'
    # and replace the block below with the new output.
    github_token: !vault |
      $ANSIBLE_VAULT;1.1;AES256
      REPLACE_WITH_ANSIBLE_VAULT_ENCRYPT_STRING_OUTPUT

    # Defaults to a full production deploy — the latest GitHub release tag
    # of barrins_api (Constitution ss25/ss27: production only ever deploys
    # released versions). Pass -e deploy_env=staging to deploy a
    # side-by-side staging instance instead, from a branch (develop by
    # default — staging exists specifically to preview pre-release code).
    #   ansible-playbook barrins_api.yml -e deploy_env=staging \
    #     -e fastapi_backend_git_branch=my-feature
    # Roll production back to an older release:
    #   ansible-playbook barrins_api.yml -e fastapi_backend_release_tag=v1.2.3
    deploy_env: production
    env_suffix: "{{ '-staging' if deploy_env == 'staging' else '' }}"
    env_branch: "{{ 'develop' if deploy_env == 'staging' else 'main' }}"
    backend_port: "{{ 8511 if deploy_env == 'staging' else 8011 }}"
    backend_domain: "api{{ env_suffix }}.barrins-codex.org"
    # Local, git-ignored .env — deployed to ~/projects/{{ backend_domain
    # }}/.env on every run if present on this machine, skipped otherwise.
    # See secrets/README.md to create it.
    backend_env_file: "{{ playbook_dir }}/secrets/barrins_api/{{ deploy_env }}.env"

  roles:
    - role: register_ssl
      tags:
        - backend
        - certs
      register_ssl_server_name: "{{ backend_domain }}"

    - role: fastapi_backend
      tags:
        - backend
      fastapi_backend_repo: barrins-project/barrins_api
      fastapi_backend_server_name: "{{ backend_domain }}"
      fastapi_backend_app_name: "api{{ env_suffix }}"
      fastapi_backend_port: "{{ backend_port }}"
      fastapi_backend_use_release_tag: "{{ deploy_env == 'production' }}"
      fastapi_backend_git_branch: "{{ env_branch }}"
      fastapi_backend_entrypoint: "app.main:app"
      fastapi_backend_env_file: "{{ backend_env_file }}"

    - role: backend_website
      tags:
        - backend
      backend_website_server_name: "{{ backend_domain }}"
      backend_website_port: "{{ backend_port }}"

  post_tasks:
    - name: Reminder — pending steps this playbook does not automate
      ansible.builtin.debug:
        msg:
          - "This playbook never runs Alembic. SSH in and run, from"
          - "~/projects/{{ backend_domain }}: 'source .venv/bin/activate &&"
          - "alembic upgrade head' (or 'uv run alembic upgrade head' if"
          - "using uv) to apply pending migrations."
      tags: [backend, deploy]

    - name: Reminder — every frontend served by this backend
      ansible.builtin.debug:
        msg:
          - "barrins_api is shared by every frontend pointing its"
          - "VITE_API_BASE_URL at {{ backend_domain }} (currently Tolaria"
          - "News and Tamiyo Scroll). Restarting it here affects all of"
          - "them at once. ALLOWED_ORIGINS/FRONTEND_BASE_URL in"
          - "{{ backend_env_file }} must list every one of those origins —"
          - "see docs/content/ops/deployment/backend.md."
      tags: [backend, deploy]

    - name: Reminder — .env is local-only, not managed by git
      ansible.builtin.debug:
        msg:
          - "{{ backend_env_file }} is git-ignored (Constitution ss34) —"
          - "if this is a fresh checkout and that file doesn't exist yet on"
          - "this machine, the .env step above was skipped and the"
          - "server's existing .env (if any) was left untouched. See"
          - "secrets/README.md."
      tags: [backend, deploy]
